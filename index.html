<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="أداة المعالجة الإحصائية المتقدمة — تحليل احترافي لاستبيانات مقياس ليكرت مع مؤشرات إحصائية شاملة — Advanced Statistical Processing Tool" />
  <meta name="author" content="STTS Project" />
  <meta name="keywords" content="statistical analysis, Likert scale, questionnaire, survey, إحصاء, مقياس ليكرت, استبيان" />
  <meta property="og:title" content="STTS — Advanced Statistical Processing Tool" />
  <meta property="og:description" content="Professional Likert scale questionnaire analysis with comprehensive statistical indicators — bilingual Arabic & English" />
  <meta property="og:type" content="website" />
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <title>STTS — أداة المعالجة الإحصائية المتقدمة</title>
  <link rel="stylesheet" href="css/styles.css" />
  <!-- Chart.js CDN with SRI -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>

  <!-- ═══════════════════════════════════════════
       HEADER
  ═══════════════════════════════════════════ -->
  <header class="main-header">
    <h1 id="appTitle">🎯 أداة المعالجة الإحصائية المتقدمة</h1>
    <p id="appSubtitle">تحليل احترافي لاستبيانات مقياس ليكرت مع مؤشرات إحصائية شاملة</p>
    <div class="header-controls">
      <button class="toggle-btn" id="langToggleBtn" title="Switch Language">
        <span class="icon">🌍</span> English
      </button>
      <button class="toggle-btn" id="themeToggleBtn" title="Toggle Theme">
        <span class="icon">🌙</span> الوضع الداكن
      </button>
    </div>
  </header>

  <!-- ═══════════════════════════════════════════
       SETTINGS SECTION
  ═══════════════════════════════════════════ -->
  <section class="section" id="settingsSection">
    <h3 id="settingsTitle">⚙️ إعدادات الاستبيان</h3>

    <div class="grid-2">
      <!-- Sample Size -->
      <div class="form-group">
        <label for="sampleSize" id="sampleSizeLabel">
          📊 حجم العينة:
          <span class="tooltip" data-tooltip="إجمالي عدد المشاركين في الاستبيان">ℹ️</span>
        </label>
        <input type="number" id="sampleSize" placeholder="مثال: 100" min="1" />
      </div>

      <!-- Likert Scale Type -->
      <div class="form-group">
        <label for="scaleType" id="scaleTypeLabel">
          ⚖️ نوع مقياس ليكرت:
          <span class="tooltip" data-tooltip="اختر عدد خيارات الإجابة">ℹ️</span>
        </label>
        <select id="scaleType">
          <option value="" selected>-- اختر نوع المقياس --</option>
          <option value="2">ثنائي (موافق / لا أوافق)</option>
          <option value="3">ثلاثي (موافق / محايد / لا أوافق)</option>
          <option value="5">خماسي (موافق بشدة ... لا أوافق بشدة)</option>
        </select>
      </div>
    </div>

    <div class="grid-2">
      <!-- Question Number -->
      <div class="form-group">
        <label for="questionNumber" id="questionNumberLabel">
          ❓ رقم السؤال:
          <span class="tooltip" data-tooltip="رقم السؤال في الاستبيان (سيزداد تلقائياً)">ℹ️</span>
        </label>
        <input type="text" id="questionNumber" placeholder="مثال: 1" />
      </div>

      <!-- Variance Type -->
      <div class="form-group">
        <label for="varianceType" id="varianceTypeLabel">
          📐 نوع التباين:
          <span class="tooltip" data-tooltip="اختر طريقة حساب التباين">ℹ️</span>
        </label>
        <select id="varianceType">
          <option value="sample" selected>تباين العينة (N-1)</option>
          <option value="population">تباين المجتمع (N)</option>
        </select>
      </div>
    </div>

    <!-- Weights Container -->
    <div id="weightInputsContainer" class="hidden"></div>

    <!-- Counts Container -->
    <div id="inputsContainer" class="hidden"></div>

    <!-- Action Buttons -->
    <div class="buttons-row">
      <button id="calculateQuestionBtn" title="إضافة السؤال للجدول">
        <span id="btnText">➕ إضافة السؤال</span>
      </button>
      <button id="saveDataBtn" class="btn-secondary hidden" title="حفظ البيانات محلياً">
        <span id="saveDataText">💾 حفظ البيانات</span>
      </button>
      <button id="loadDataBtn" class="btn-secondary hidden" title="استرجاع البيانات المحفوظة">
        <span id="loadDataText">📂 استرجاع البيانات</span>
      </button>
    </div>

    <!-- Alert Messages -->
    <div id="errorMessage" class="alert alert-error"></div>
    <div id="successMessage" class="alert alert-success"></div>
    <div id="warningMessage" class="alert alert-warning"></div>
  </section>

  <!-- ═══════════════════════════════════════════
       RESULTS SECTION
  ═══════════════════════════════════════════ -->
  <section class="section" id="resultsSection">
    <h3 id="resultsTitle">📋 نتائج الأسئلة</h3>
    <div id="questionsCount" style="margin-bottom:12px;color:var(--text-secondary)"></div>

    <div class="table-container">
      <table id="resultsTable">
        <thead id="resultsTableHead"></thead>
        <tbody></tbody>
      </table>
    </div>

    <div class="buttons-row">
      <button id="exportWordBtn" title="تصدير إلى Word">
        <span id="exportWordText">📄 تصدير إلى Word</span>
      </button>
      <button id="exportCSVBtn" class="btn-success" title="تصدير إلى CSV">
        <span id="exportCSVText">📊 تصدير إلى CSV</span>
      </button>
      <button id="exportJSONBtn" class="btn-secondary" title="تصدير JSON">
        <span id="exportJSONText">💿 تصدير JSON</span>
      </button>
      <button id="importJSONBtn" class="btn-outline" title="استيراد JSON">
        <span id="importJSONText">📥 استيراد JSON</span>
      </button>
      <button id="resetBtn" class="btn-delete" title="إعادة تعيين الأداة">
        <span id="resetText">🔄 معالجة جديدة</span>
      </button>
    </div>
  </section>

  <!-- ═══════════════════════════════════════════
       CHARTS SECTION
  ═══════════════════════════════════════════ -->
  <section class="section hidden" id="chartSection">
    <h3 id="chartTitle">📊 توزيع الاستجابات</h3>
    <div class="grid-2">
      <div class="chart-container">
        <canvas id="barChart"></canvas>
      </div>
      <div class="chart-container">
        <canvas id="radarChart"></canvas>
      </div>
    </div>
  </section>

  <!-- ═══════════════════════════════════════════
       SUMMARY SECTION
  ═══════════════════════════════════════════ -->
  <section class="section hidden" id="summarySection">
    <h3 id="summaryTitle">📈 التحليل العام لجميع الأسئلة</h3>
    <div class="summary-grid" id="summaryGrid"></div>
    <div id="analyticalText" style="margin-top:24px"></div>
  </section>

  <!-- ═══════════════════════════════════════════
       FOOTER
  ═══════════════════════════════════════════ -->
  <footer>
    <p id="footerText">© 2026 — أداة المعالجة الإحصائية المتقدمة — الإصدار 3.0</p>
    <p style="margin-top:8px;font-size:0.82rem">
      <a href="https://github.com/" target="_blank" rel="noopener" id="githubLink">View on GitHub</a>
    </p>
  </footer>

  <!-- ═══════════════════════════════════════════
       SCRIPTS (Module Load Order)
  ═══════════════════════════════════════════ -->
  <script src="js/utils.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/statistics.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/export.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
